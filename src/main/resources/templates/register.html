<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:insert="~{user/template_user::head_user}"></head>

<body>

    <div th:insert="~{user/template_user::header_user}"></div>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-7">
                <div class="card border-0 shadow-sm overflow-hidden">
                    <div class="card-body p-5">
                        <div class="text-center mb-4">
                            <h1 class="h3 fw-bold">Crea tu cuenta</h1>
                            <p class="text-muted mb-0">Regístrate y empieza a comprar en Sunflower.</p>
                        </div>
                        <div class="alert alert-success" role="alert" th:text="${success}" th:if="${success}"></div>
                        <form th:action="@{/register}" method="post" th:object="${userDto}" class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label" for="firtName">Nombre</label>
                                <input type="text" class="form-control form-control-lg" id="firtName" th:field="*{firtName}" placeholder="Ingrese su nombre" autocomplete="off">
                                <p class="text-danger small mt-1" th:if="${#fields.hasErrors('firtName')}" th:errors="*{firtName}"></p>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="lastName">Apellido</label>
                                <input type="text" class="form-control form-control-lg" id="lastName" th:field="*{lastName}" placeholder="Ingrese su apellido" autocomplete="off">
                                <p class="text-danger small mt-1" th:if="${#fields.hasErrors('lastName')}" th:errors="*{lastName}"></p>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="email">Email</label>
                                <input type="email" class="form-control form-control-lg" id="email" th:field="*{email}" placeholder="Ingrese su email" autocomplete="off">
                                <p class="text-danger small mt-1" th:if="${#fields.hasErrors('email')}" th:errors="*{email}"></p>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label" for="cellphone">Teléfono</label>
                                <input type="text" class="form-control form-control-lg" id="cellphone" th:field="*{cellphone}" placeholder="Ingrese su teléfono" autocomplete="off">
                                <p class="text-danger small mt-1" th:if="${#fields.hasErrors('cellphone')}" th:errors="*{cellphone}"></p>
                            </div>
                            <div class="col-12">
                                <label class="form-label" for="address">Dirección</label>
                                <input type="text" class="form-control form-control-lg" id="address" th:field="*{address}" placeholder="Ingrese su dirección" autocomplete="off">
                                <p class="text-danger small mt-1" th:if="${#fields.hasErrors('address')}" th:errors="*{address}"></p>
                            </div>
                            <div class="col-12">
                                <label class="form-label" for="password">Contraseña</label>
                                <input type="password" class="form-control form-control-lg" id="password" th:field="*{password}" placeholder="Ingrese su contraseña" autocomplete="off">
                                <p class="text-danger small mt-1" th:if="${#fields.hasErrors('password')}" th:errors="*{password}"></p>
                            </div>
                            <div class="col-12 d-grid">
                                <button type="submit" class="btn btn-purple-solid btn-lg">Registrar</button>
                            </div>
                        </form>
                        <div class="text-center mt-4">
                            <span class="text-muted">¿Ya tienes cuenta?</span>
                            <a th:href="@{/login}" class="link-primary">Inicia sesión</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:insert="~{user/template_user::footer_user}"></div>

</body>

</html>
