<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:fragment="head">
    <title>Panel Admin - Naturley</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

    <style>
        body {
            font-family: 'Poppins', sans-serif;
            background-color: #faf9fd;
            color: #2e263d;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }
        .navbar-admin {
            background-color: #2e1065 !important;
            border-bottom: 4px solid #a78bfa;
            box-shadow: 0 4px 15px rgba(0,0,0,0.15);
        }
        .navbar-admin .navbar-brand {
            color: #ddd6fe !important;
            font-weight: 700;
            font-size: 1.4rem;
        }
        .navbar-admin .nav-link {
            color: #f5f3ff !important;
            font-weight: 500;
        }
        .navbar-admin .nav-link:hover {
            color: #c084fc !important;
        }
        .btn-admin-search {
            background-color: #c084fc; 
            border: none;
            color: #2e1065;
            font-weight: 600;
            border-radius: 8px;
        }
        .btn-admin-search:hover {
            background-color: #a78bfa;
            color: #2e1065;
        }
        .footer-admin {
            background-color: #1e1b4b;
            color: #c084fc;
            padding: 18px 0;
            width: 100%;
            margin-top: auto;
        }
        .dropdown-menu {
            border-radius: 10px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            background-color: #ffffff;
            border: 1px solid #e9d5ff;
        }
        .dropdown-item:hover {
            background-color: #f3e8ff;
            color: #6b21a8;
        }
    </style>
</head>
<body>

    <div th:fragment="header"> 
        <nav class="navbar navbar-expand-lg navbar-admin navbar-dark fixed-top py-3">
            <div class="container">
                <a class="navbar-brand" th:href="@{/admin}">🔮 Panel Administrador</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navAdmin">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navAdmin">
                    <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                        <li class="nav-item dropdown">
                            <a class="nav-link dropdown-toggle" href="#" id="navbarDropdownAdmin" role="button" data-bs-toggle="dropdown" aria-expanded="false">
                                🛠️ Gestionar Tienda
                            </a>
                            <ul class="dropdown-menu" aria-labelledby="navbarDropdownAdmin">
                                <li><a class="dropdown-item" th:href="@{/admin/products/show}">📦 Ver Productos</a></li>
                                <li><a class="dropdown-item" th:href="@{/admin/stock}">📊 Stock</a></li>
                                <li><a class="dropdown-item" th:href="@{/admin/categories}">📁 Categorías</a></li>
                            </ul>
                        </li>
                    </ul>
                    <div class="d-flex align-items-center gap-3">
                        <div class="dropdown">
                            <button class="btn btn-light btn-sm rounded-pill d-flex align-items-center gap-2 px-3" type="button" id="adminProfileMenu" data-bs-toggle="dropdown" aria-expanded="false">
                                <span style="font-size: 1.15rem;">👤</span>
                                <span th:text="${nombre != null ? nombre : 'ADMIN'} + ' | ADMIN'">ADMIN | ADMIN</span>
                            </button>
                            <ul class="dropdown-menu dropdown-menu-end mt-2" aria-labelledby="adminProfileMenu">
                                <li><a class="dropdown-item text-danger" th:href="@{/logout}">❌ Cerrar sesión</a></li>
                            </ul>
                        </div>
                    </div>
                </div>
            </div>
        </nav>
        <div style="height: 85px;"></div>
    </div>

    <footer th:fragment="footer" class="footer-admin text-center mt-auto">
        <div class="container">
            <p class="m-0 small text-white-50">🔑 Modo Administrador</p>
            <span class="fw-bold" style="color: #c084fc;">&copy; SUNFLOWER</span>
        </div>
    </footer>

</body>
</html>
