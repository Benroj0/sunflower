<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/template_admin::head}"></head>
<body>

    <div th:replace="~{admin/template_admin::header}"></div>

    <main class="container my-5">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="bg-white p-4 rounded shadow-sm border border-light">
                    <h3 class="fw-bold mb-4" style="color: #2e1065 !important;">✏️ Editar Producto</h3>
                    
                    <form th:action="@{/admin/products/update-product}" method="post" enctype="multipart/form-data">
                        <input type="hidden" name="id" th:value="${product.id}">
                        
                        <div class="mb-3">
                            <label class="form-label fw-semibold" for="name">Nombre del Producto</label>
                            <input type="text" class="form-control" id="name" name="name" th:value="${product.name}" required style="border-radius: 8px;">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold" for="description">Descripción</label>
                            <textarea class="form-control" id="description" name="description" rows="3" required style="border-radius: 8px;" th:text="${product.description}"></textarea>
                        </div>

                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold" for="category_id">Categoría</label>
                                <select id="category_id" name="category_id" class="form-select" required style="border-radius: 8px;">
                                    <option th:each="category:${listCategories}" th:text="${category.name}" th:value="${category.id}" th:selected="${category.id == product.categoryEntity?.id}"></option>
                                </select>
                            </div>
                            
                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold" for="price">Precio (S/.)</label>
                                <input type="number" class="form-control" step="any" id="price" name="price" th:value="${product.price}" required style="border-radius: 8px;">
                            </div>
                        </div>

                        <div class="mb-4">
                            <label class="form-label fw-semibold" for="img">Imagen (Dejar en blanco para mantener la actual)</label>
                            <input type="file" class="form-control" id="img" name="img" style="border-radius: 8px;">
                        </div>

                        <div class="d-flex gap-2 justify-content-end border-top pt-3">
                            <a th:href="@{/admin/products/show}" class="btn btn-light px-4 fw-semibold" style="border-radius: 8px;">Cancelar</a>
                            <button type="submit" class="btn text-white px-5 fw-semibold" style="background-color: #7c3aed; border-radius: 8px;">
                                💾 Actualizar Producto
                            </button>
                        </div>

                    </form>
                </div>
            </div>
        </div>
    </main>

    <div th:replace="~{admin/template_admin::footer}"></div>

</body>
</html>
