<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:replace="~{admin/template_admin::head}"></head>
<body>
    <div th:replace="~{admin/template_admin::header}"></div>

    <main class="container my-5">
        <div class="d-flex justify-content-between align-items-center mb-4">
            <h2 class="fw-bold">Gestión de Productos</h2>
            <a th:href="@{/admin/products/create}" class="btn btn-primary">Nuevo Producto</a>
        </div>

        <table class="table table-hover shadow-sm">
            <thead class="table-light">
                <tr>
                    <th>Nombre</th>
                    <th>Categoría</th>
                    <th>Precio</th>
                    <th>Stock Actual</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody>
                <tr th:each="product : ${products}">
                    <td th:text="${product.name}"></td>
                    <td th:text="${product.categoryEntity.name}"></td>
                    <td th:text="'S/. ' + ${product.price}"></td>
                    
                    <td class="fw-bold text-primary">
                        <span th:if="${product.stocks != null and !product.stocks.isEmpty()}" 
                              th:text="${product.stocks[product.stocks.size()-1].balance}">0</span>
                        <span th:if="${product.stocks == null or product.stocks.isEmpty()}">0</span>
                    </td>
                    
                    <td>
                        <a th:href="@{/admin/products/edit/{id}(id=${product.id})}" class="btn btn-sm btn-warning">Editar</a>
                        <a th:href="@{/admin/products/delete/{id}(id=${product.id})}" class="btn btn-sm btn-danger">Eliminar</a>
                    </td>
                </tr>
            </tbody>
        </table>
    </main>

    <div th:replace="~{admin/template_admin::footer}"></div>
</body>
</html>
