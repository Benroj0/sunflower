<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org"> 
<head th:replace="~{admin/template_admin::head}"></head>
<body>

    <div th:replace="~{admin/template_admin::header}"></div>
       
    <main class="container my-5">
        <div class="row g-4">
            
            <div class="col-md-4">
                <div class="bg-white p-4 rounded shadow-sm border border-light">
                    <h4 class="fw-bold mb-4" style="color: #2e1065 !important;">📁 Nueva Categoría</h4>
                    <form th:action="@{/admin/categories/save}" method="post">
                        <div class="mb-3">
                            <label for="name" class="form-label fw-semibold">Nombre de Categoría</label>
                            <input type="text" class="form-control" id="name" name="name" placeholder="Ej. Cuidado Personal" required style="border-radius: 8px;" autocomplete="off">
                        </div>
                        <button type="submit" class="btn text-white w-100 fw-semibold" style="background-color: #7c3aed; border-radius: 8px;">
                            💾 Guardar Categoría
                        </button>
                    </form>
                </div>
            </div>

            <div class="col-md-8">
                <div class="bg-white p-4 rounded shadow-sm border border-light">
                    <h4 class="fw-bold mb-4" style="color: #2e1065 !important;">📋 Categorías Registradas</h4>
                    <div class="table-responsive">
                        <table class="table table-hover align-middle">
                            <thead class="table-light text-secondary">
                                <tr>
                                    <th scope="col" class="py-3">ID</th>
                                    <th scope="col" class="py-3">Nombre</th>
                                    <th scope="col" class="py-3">Estado</th>
                                </tr>
                            </thead>
                            <tbody>
                                <tr th:each="cat:${categories}">
                                    <td class="text-muted fw-bold" th:text="${cat.id}"></td>
                                    <td class="fw-semibold text-dark" th:text="${cat.name}"></td>
                                    <td>
                                        <span class="badge bg-success-subtle text-success border border-success-subtle px-2.5 py-1.5 rounded-pill small" th:if="${cat.status == '1'}">Activo</span>
                                        <span class="badge bg-danger-subtle text-danger border border-danger-subtle px-2.5 py-1.5 rounded-pill small" th:if="${cat.status != '1'}">Inactivo</span>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <div th:replace="~{admin/template_admin::footer}"></div>

</body>
</html>
