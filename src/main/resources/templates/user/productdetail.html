<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head th:insert="~{user/template_user::head_user}"></head>
<body>
    <div th:insert="~{user/template_user::userlogged}"></div>

    <main class="container my-5">
        <div class="card border-0 shadow-sm rounded-4 overflow-hidden">
            <div class="row g-0 align-items-center">
                <div class="col-lg-6">
                    <div class="h-100 bg-white p-4 d-flex justify-content-center align-items-center" style="min-height: 420px;">
                        <img th:src="@{/images/{img}(img=${product.image})}" class="img-fluid rounded-4 shadow-sm" style="max-height: 380px; object-fit: contain;" alt="Producto">
                    </div>
                </div>
                <div class="col-lg-6">
                    <div class="p-5">
                        <h2 th:text="${product.name}" class="fw-bold mb-3">Nombre Producto</h2>
                        <p class="text-muted mb-4" th:text="${product.description}">Descripción del producto para destacar sus beneficios y detalles.</p>
                        <div class="d-flex align-items-baseline gap-3 mb-4">
                            <h3 class="text-primary fw-bold mb-0" th:text="'S/. ' + ${product.price}">S/. 0.00</h3>
                        </div>
                        <div class="mb-4 p-4 bg-purple bg-opacity-10 rounded-4">
                            <div class="d-flex align-items-center justify-content-between">
                                <span class="fw-semibold">Disponibilidad</span>
                                <span th:text="${stock} + ' unidades disponibles'" class="badge bg-success">0</span>
                            </div>
                        </div>
                        <div class="mb-4">
                            <p class="mb-2 fw-semibold">Detalles</p>
                            <p class="text-muted mb-0" th:text="${product.description}">Información extendida del producto.</p>
                        </div>
                        <div class="d-flex flex-column flex-sm-row gap-3 align-items-start">
                            <form th:if="${stock > 0}" th:action="@{/user/cart/add-product}" method="POST" class="d-flex gap-3 flex-wrap align-items-center js-add-to-cart">
                                <input type="hidden" name="idProduct" th:value="${product.id}">
                                <input type="hidden" name="nameProduct" th:value="${product.name}">
                                <input type="hidden" name="price" th:value="${product.price}">
                                <div class="d-flex flex-column">
                                    <label class="form-label mb-2">Cantidad</label>
                                    <input type="number" name="quantity" value="1" min="1" th:max="${stock}" class="form-control" style="width: 110px;">
                                </div>
                                <button type="submit" class="btn btn-warning btn-lg px-4">Añadir al Carrito</button>
                            </form>
                            <div th:if="${stock <= 0}" class="mt-2">
                                <button class="btn btn-secondary btn-lg" disabled>Producto Agotado</button>
                            </div>
                        </div>
                        <div class="mt-4">
                            <a th:href="@{/home}" class="btn btn-soft-purple px-4">← Volver a la tienda</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <div th:insert="~{user/template_user::footer_user}"></div>
</body>
</html>
