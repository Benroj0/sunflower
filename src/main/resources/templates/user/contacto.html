<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head th:insert="~{user/template_user::head_user}"></head>

<body>

    <div th:insert="~{user/template_user::header_user}" th:if="${id==null}"></div>
    <div th:insert="~{user/template_user::userlogged}" th:unless="${id==null}"></div>

    <main class="container my-5">
        <div class="card border-0 shadow-sm rounded-4 p-4">
            <h1 class="h3 fw-bold mb-3">Contacto</h1>
            <p class="text-muted mb-4">¿Tienes alguna duda o necesitas ayuda con tu pedido? Estamos aquí para ayudarte.</p>
            <div class="row g-4">
                <div class="col-md-6">
                    <div class="p-4 bg-white rounded-4 border">
                        <h5 class="fw-semibold">Email</h5>
                        <p class="text-muted mb-0">contacto@sunflower.com</p>
                    </div>
                </div>
                <div class="col-md-6">
                    <div class="p-4 bg-white rounded-4 border">
                        <h5 class="fw-semibold">Teléfono</h5>
                        <p class="text-muted mb-0">+51 987 654 321</p>
                    </div>
                </div>
            </div>
            <div class="mt-4 p-4 bg-light rounded-4 border">
                <h5 class="fw-semibold">Horario de atención</h5>
                <p class="text-muted mb-0">Lunes a viernes de 9:00 a 18:00</p>
            </div>
        </div>
    </main>

    <div th:insert="~{user/template_user::footer_user}"></div>

</body>

</html>
