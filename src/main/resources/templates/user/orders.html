<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

    <head th:insert="~{user/template_user::head_user}"></head>

    <body>

        <!-- Navigation -->
        <div th:insert="~{user/template_user::header_user}" th:if="${id==null}"></div>
        <div th:insert="~{user/template_user::userlogged}" th:unless="${id==null}"></div>

        <main>
        <div class="container mt-5">
            <div class="card mb-4">
                <div class="card-body">
                    <div class="row">
                        <div class="col-lg-12">
                            <h3 class="mb-4">📦 Mis Compras</h3>

                            <div th:if="${#lists.isEmpty(orders)}" class="alert alert-light text-center py-5">
                                <p class="fs-5 text-muted mb-0">Aún no has realizado ninguna compra.</p>
                            </div>

                            <div th:if="${not #lists.isEmpty(orders)}" class="table-responsive">
                                <table class="table table-hover align-middle">
                                    <thead class="table-light">
                                        <tr>
                                            <th># Orden</th>
                                            <th>Fecha</th>
                                            <th>Total</th>
                                            <th>Estado</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="order : ${orders}">
                                            <td class="fw-bold" th:text="'N° ' + ${order.id}">N° 1</td>
                                            <td th:text="${#temporals.format(order.dateCreated, 'dd/MM/yyyy HH:mm')}">01/01/2026 12:00</td>
                                            <td class="text-success fw-semibold" th:text="'S/. ' + ${order.total}">S/. 0.00</td>
                                            <td>
                                                <span th:classappend="${order.status == 'Proceso'} ? 'badge bg-warning text-dark' : 'badge bg-success text-white'"
                                                      th:text="${order.status}">Proceso</span>
                                            </td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>

                            <div class="d-flex justify-content-end mt-4">
                                <a th:href="@{/home}" class="btn btn-light px-4 fw-semibold" style="border-radius: 8px;">⬅️ Volver a la Tienda</a>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        </main>

        <div th:insert="~{user/template_user::footer_user}"></div>

    </body>
</html>
