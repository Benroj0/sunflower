<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

    <head th:insert="~{user/template_user::head_user}"></head>

    <body>

        <div th:insert="~{user/template_user::header_user}" th:if="${id==null}"></div>
        <div th:insert="~{user/template_user::userlogged}" th:unless="${id==null}"></div>

        <main class="container my-5">
            <div class="row g-4">
                <div class="col-lg-8">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body">
                            <div class="d-flex flex-column flex-md-row align-items-start justify-content-between gap-3 mb-4">
                                <div>
                                    <h2 class="h4 fw-bold">Carrito</h2>
                                    <p class="text-muted mb-0">Gestiona tu selección antes de continuar al resumen.</p>
                                </div>
                                <span class="badge bg-purple bg-opacity-15 text-purple">Artículos: <span th:text="${cart.size()}">0</span></span>
                            </div>

                            <div class="table-responsive">
                                <table class="table align-middle">
                                    <thead class="table-light">
                                        <tr>
                                            <th>Producto</th>
                                            <th>Precio</th>
                                            <th>Cantidad</th>
                                            <th>Total</th>
                                            <th>Acción</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        <tr th:each="item : ${cart}">
                                            <td th:text="${item.nameProduct}">Nombre</td>
                                            <td th:text="'S/. ' + ${item.price}">Precio</td>
                                            <td>
                                                <form th:action="@{/user/cart/update-quantity}" method="POST" class="d-flex align-items-center gap-2">
                                                    <input type="hidden" name="idProduct" th:value="${item.idProduct}">
                                                    <input type="number" name="quantity" th:value="${item.quantity}" min="1" class="form-control form-control-sm" style="width: 80px;">
                                                    <button type="submit" class="btn btn-sm btn-outline-primary" title="Actualizar">OK</button>
                                                </form>
                                            </td>
                                            <td th:text="'S/. ' + ${item.getTotalPriceItem()}">Total</td>
                                            <td><a th:href="@{/user/cart/delete-item-cart/{id} (id = ${item.idProduct})}" class="btn btn-danger btn-sm">Quitar</a></td>
                                        </tr>
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="col-lg-4">
                    <div class="card border-0 shadow-sm">
                        <div class="card-body">
                            <h5 class="fw-bold">Subtotal</h5>
                            <div class="bg-light rounded-3 p-3 mb-3">
                                <div class="d-flex justify-content-between align-items-center mb-2">
                                    <span class="text-muted">Total</span>
                                    <strong th:text="'S/. ' + ${total}">S/. 0.00</strong>
                                </div>
                                <div class="d-grid">
                                    <a th:href="@{/user/order/sumary-order}" class="btn btn-purple-solid">Continuar la compra</a>
                                </div>
                            </div>
                            <a th:href="@{/home}" class="btn btn-outline-purple w-100">Seguir comprando</a>
                        </div>
                    </div>
                </div>
            </div>
        </main>

        <div th:insert="~{user/template_user::footer_user}"></div>

    </body>

</html>
